name: 'Terraform Plan & Apply'

on:
  push:
    branches: [ "main" ]

jobs:
  terraform-plan:
    name: 'Terraform Plan'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Google Auth
      uses: 'google-github-actions/auth@v2'
      with:
        credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

    - name: Terraform Init
      run: terraform init
      working-directory: ./wiz-infrastructure

    - name: Terraform Plan
      run: terraform plan
      working-directory: ./wiz-infrastructure

  terraform-apply:
    name: 'Terraform Apply'
    needs: terraform-plan  # Only runs if the plan passes
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Google Auth
      uses: 'google-github-actions/auth@v2'
      with:
        credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

    - name: Terraform Init
      run: terraform init
      working-directory: ./wiz-infrastructure

    - name: Terraform Apply
      run: terraform apply -auto-approve
      working-directory: ./wiz-infrastructure